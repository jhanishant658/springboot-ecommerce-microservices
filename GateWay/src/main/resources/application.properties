spring.application.name=GateWay

server.port=8080

#routes 1

spring.cloud.gateway.routes[0].id=UserService
spring.cloud.gateway.routes[0].uri=lb://UserService
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/user**

#routes 2

spring.cloud.gateway.routes[1].id=OrderService
spring.cloud.gateway.routes[1].uri=lb://OrderService
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/order/**

#routes 3

spring.cloud.gateway.routes[2].id=Product-Service
spring.cloud.gateway.routes[2].uri=lb://Product-Service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/products/**

#routes 4

spring.cloud.gateway.routes[3].id=cart-service
spring.cloud.gateway.routes[3].uri=lb://cart-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/cart/**
